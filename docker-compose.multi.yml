services:
  nginx:
    image: nginx:alpine
    container_name: websearch-nginx
    ports:
      - "${WEBSEARCH_API_HOST_PORT:-9000}:9000"
    volumes:
      - ./nginx.multi.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      websearch:
        condition: service_healthy
    restart: unless-stopped

  websearch:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SEARXNG_GIT_REF: ${SEARXNG_GIT_REF:-master}
        CRAWL4AI_PRE_RELEASE: ${CRAWL4AI_PRE_RELEASE:-false}
    image: websearch:latest
    pull_policy: never
    environment:
      - WEBSEARCH_CONFIG_PATH=${WEBSEARCH_CONFIG_PATH:-/app/config.yaml}
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-}
    volumes:
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml:ro
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
      - ./prompt:/app/prompt:ro
    ports:
      - target: 8080
        published: 0
        protocol: tcp
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  dashboard_logs:
    image: websearch:latest
    pull_policy: never
    container_name: websearch-dashboard-logs
    command:
      - python
      - /app/main.py
      - dashboard-logs
      - --output-dir
      - /app/output
      - --interval-seconds
      - "10"
      - --window-seconds
      - "10800"
      - --limit
      - "10"
      - --format
      - "table"
    environment:
      - WEBSEARCH_CONFIG_PATH=${WEBSEARCH_CONFIG_PATH:-/app/config.yaml}
    volumes:
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    depends_on:
      websearch:
        condition: service_healthy
